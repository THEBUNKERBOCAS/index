html<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Bunker | Aplicación Web Dinámica de Biodiversidad</title>
    <style>
        /* Paleta de Colores Exótica y Eléctrica */
        :root {
            --verde-bunker: #0b291b;
            --neon-selva: #1abc9c;
            --amarillo-sol: #f1c40f;
            --coral-orquidea: #e74c3c;
            --magenta-mariposa: #9b59b6;
            --azul-rio: #3498db;
            --blanco: #ffffff;
            --gris-panel: #1e272e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f5fcf6; color: #2c3e50; padding-top: 80px; }

        /* --- MENÚ DE ESQUINA DINÁMICO (FILTROS DE ÁREA) --- */
        #menu-esquina {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 1500;
            background: rgba(11, 41, 27, 0.95);
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 2px solid var(--neon-selva);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        #menu-esquina h4 { color: white; font-size: 11px; text-transform: uppercase; text-align: center; margin-bottom: 5px; letter-spacing: 1px;}
        .btn-filtro {
            background: transparent; border: 1px solid var(--neon-selva); color: white;
            padding: 8px 15px; border-radius: 30px; cursor: pointer; text-align: left;
            font-size: 13px; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-filtro:hover, .btn-filtro.activo { background: var(--neon-selva); color: var(--verde-bunker); }

        /* Barra de Navegación */
        header { background-color: var(--verde-bunker); position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        nav { display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; padding: 15px 20px; }
        .logo { color: var(--blanco); font-size: 24px; font-weight: 800; text-transform: uppercase; }
        .logo span { color: var(--neon-selva); }

        /* --- VISOR CENTRAL DE PLANTILLAS DINÁMICAS --- */
        .contenedor-principal { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
        
        .visor-plantilla {
            background: white; border-radius: 30px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06); border: 1px solid rgba(0,0,0,0.05);
            display: grid; grid-template-columns: 1fr 1fr; min-height: 500px;
            animation: aparecer 0.5s ease-out;
        }
        @keyframes aparecer { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .plantilla-img { background-size: cover; background-position: center; min-height: 350px; }
        .plantilla-info { padding: 50px; display: flex; flex-direction: column; justify-content: center; }
        .plantilla-info h2 { font-size: 38px; color: var(--verde-bunker); margin-bottom: 15px; text-transform: uppercase; }
        .plantilla-info p { font-size: 18px; color: #57606f; margin-bottom: 25px; }

        /* --- CREADOR SECRETO DE PLANTILLAS --- */
        #creator-panel {
            background: var(--gris-panel); color: white; padding: 30px; border-radius: 25px;
            max-width: 1100px; margin: 40px auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #creator-panel h3 { color: var(--neon-selva); margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .form-control { display: flex; flex-direction: column; }
        .form-control label { font-size: 13px; color: #a4b0be; margin-bottom: 5px; }
        .form-control input, .form-control select, .form-control textarea { padding: 12px; border-radius: 8px; border: none; background: #2f3542; color: white; font-size: 15px; }
        
        /* Botones y Pie */
        .btn-action { display: inline-block; background-color: var(--coral-orquidea); color: white; padding: 12px 30px; text-decoration: none; border-radius: 50px; font-weight: bold; text-align: center; cursor: pointer; border: none; }
        footer { background-color: #05140d; color: #799487; text-align: center; padding: 40px 20px; margin-top: 60px; }
        
        @media (max-width: 768px) {
            .visor-plantilla { grid-template-columns: 1fr; }
            #menu-esquina { top: auto; bottom: 20px; right: 20px; left: 20px; flex-direction: row; overflow-x: auto; }
            .btn-filtro { white-space: nowrap; }
        }
    </style>
</head>
<body>

    <!-- MENÚ DE LA ESQUINA SUPERIOR DERECHA -->
    <div id="menu-esquina">
        <h4>Filtrar Área</h4>
        <button class="btn-filtro activo" onclick="mostrarArea('hospedaje', this)">⛺ Hospedaje</button>
        <button class="btn-filtro" onclick="mostrarArea('restaurante', this)">🍳 Restaurante</button>
        <button class="btn-filtro" onclick="mostrarArea('senderismo', this)">🥾 Senderismo</button>
        <button class="btn-filtro" onclick="mostrarArea('aves', this)">🦜 Aves</button>
        <button class="btn-filtro" onclick="mostrarArea('insectos', this)">🦋 Insectos</button>
    </div>

    <header>
        <nav>
            <div class="logo">The <span>Bunker</span></div>
            <div id="google_translate_element"></div>
        </nav>
    </header>

    <!-- VISOR CENTRAL DINÁMICO -->
    <main class="contenedor-principal">
        <div class="visor-plantilla" id="visor-contenido">
            <!-- El contenido inicial se inyecta dinámicamente con JavaScript -->
        </div>
    </main>

    <!-- PANEL EXCLUSIVO PARA AGREGAR NUEVAS PLANTILLAS -->
    <section id="creator-panel">
        <h3>🛠️ Creador Dinámico de Plantillas Nuevas</h3>
        <form onsubmit="crearNuevaPlantilla(event)">
            <div class="form-grid">
                <div class="form-control">
                    <label>Asignar a qué Área:</label>
                    <select id="nueva-area">
                        <option value="hospedaje">⛺ Hospedaje</option>
                        <option value="restaurante">🍳 Restaurante</option>
                        <option value="senderismo">🥾 Senderismo</option>
                        <option value="aves">🦜 Avistamiento de Aves</option>
                        <option value="insectos">🦋 Insectos y Mariposas</option>
                    </select>
                </div>
                <div class="form-control">
                    <label>Título de la Plantilla:</label>
                    <input type="text" id="nuevo-titulo" required placeholder="Ej: Glamping de Lujo / Tour Nocturno">
                </div>
                <div class="form-control" style="grid-column: span 2;">
                    <label>Descripción detallada:</label>
                    <textarea id="nueva-descripcion" rows="3" required placeholder="Describe los servicios, horarios o características especiales..."></textarea>
                </div>
                <div class="form-control" style="grid-column: span 2;">
                    <label>Nombre de la Foto Guardada o Enlace:</label>
                    <input type="text" id="nueva-foto" required placeholder="Ej: mi_foto.jpg o enlace web de la foto">
                </div>
            </div>
            <button type="submit" class="btn-action" style="background-color: #2ecc71;">➕ Insertar Plantilla en el Sistema</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 The Bunker (Bürí) | Aplicación Autónoma.</p>
        <button class="btn-filtro" style="margin: 15px auto 0; border-color: #799487; color: #799487;" onclick="desbloquearCreador()">🔐 Acceso Propietario (Añadir Plantillas)</button>
    </footer>

        }
    </script>
